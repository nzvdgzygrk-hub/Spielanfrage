<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Spielanfrage"><meta name="theme-color" content="#0b4eb3"><link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=9"><link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=9"><link rel="icon" type="image/svg+xml" href="icon.svg?v=9"><title>SSVg Spielanfrage</title><style>*{box-sizing:border-box}body{margin:0;background:#eef4ff;color:#102033;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:900px;margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 14px 95px}.hero{background:linear-gradient(135deg,#083b91,#0b64db,#42a5ff);color:#fff;border-radius:26px;padding:20px 16px;box-shadow:0 14px 35px #10203322}.hero h1{margin:0}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab,.btn{border:0;border-radius:15px;padding:12px;font-weight:800;background:#fff;color:#0b4eb3;box-shadow:0 6px 18px #10203314}.tab.active,.primary{background:#0b4eb3;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:#fff;border:1px solid #d8e2f2;border-radius:22px;padding:15px;margin-bottom:12px;box-shadow:0 12px 30px #10203312}label{display:block;font-weight:800;font-size:13px;margin:12px 0 6px}textarea,input,select{width:100%;border:1px solid #d8e2f2;border-radius:15px;padding:12px;font:inherit;min-height:48px}textarea{min-height:130px}.row,.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.filter{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.chip{border:1px solid #d8e2f2;border-radius:15px;background:#fff;padding:12px;font-weight:800}.chip.active{background:#e8f1ff;color:#0b4eb3;border-color:#0b4eb3}.day{background:#fff;border:1px solid #d8e2f2;border-radius:18px;padding:12px;margin-bottom:10px}.day.home{background:#f0fff7}.day.away{background:#fff8ed}.day.off{background:#fff5f5}.day.done{background:#f3f4f6;opacity:.75}.daytop{display:flex;justify-content:space-between;gap:8px;font-weight:900;margin-bottom:10px}.badge{font-size:12px;border-radius:999px;padding:4px 8px;background:#edf3ff;white-space:nowrap}.mark{display:inline-block;margin-left:4px;color:#c66a00}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.grid button{border:1px solid #d8e2f2;border-radius:12px;background:#f8fafc;color:#102033;padding:9px 4px;font-weight:800;font-size:12px}.grid button.active{background:#0b4eb3;color:#fff}.grid .home.active{background:#0f8f52}.grid .away.active{background:#c66a00}.grid .off.active{background:#c62828}.grid .done.active{background:#4b5563}.mini{display:grid;grid-template-columns:1fr 105px;gap:8px}.mailbox{margin-top:10px;border-top:1px solid #d8e2f2;padding-top:10px}.hint{color:#667085;font-size:13px}.out{min-height:430px}.bottom{position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);background:#eef4ffe6;backdrop-filter:blur(14px);border-top:1px solid #d8e2f2}.bottom div{max-width:900px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.toast{display:none;position:fixed;left:50%;bottom:85px;transform:translateX(-50%);background:#102033;color:white;padding:12px 16px;border-radius:999px;font-weight:800}@media(max-width:430px){.row,.actions,.mini{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.grid button:last-child{grid-column:1/-1}}</style></head><body><div class="app"><section class="hero"><h1>⚽ Spielanfrage</h1><p>NRW-Feiertage + Schulferien im kopierten Text</p></section><nav class="tabs"><button class="tab active" data-tab="text">Text</button><button class="tab" data-tab="tage">Tage</button><button class="tab" data-tab="kopie">Kopieren</button></nav><section id="text" class="panel active"><div class="card"><h2>Standardtext</h2><label>Text oben</label><textarea id="top"></textarea><label>Text unten</label><textarea id="bottom"></textarea><button class="btn" id="reset">Standard wiederherstellen</button></div><div class="card"><h2>Zeitraum</h2><div class="row"><div><label>Von</label><input id="von" type="date"></div><div><label>Bis</label><input id="bis" type="date"></div></div><label>Tage anzeigen</label><div class="filter"><button class="chip active" data-filter="both">Beide</button><button class="chip" data-filter="sat">Samstag</button><button class="chip" data-filter="sun">Sonntag</button></div><label>Gestrichene Tage</label><select id="strike"><option value="wa">mit ~Text~</option><option value="txt">nicht verfügbar</option></select><div class="actions"><button class="btn primary" id="load">Tage laden</button><button class="btn" id="toDays">Zu Tage</button></div><p class="hint">Feiertage und Schulferien NRW werden automatisch markiert.</p></div></section><section id="tage" class="panel"><div class="card"><h2>Tage auswählen</h2><div class="actions"><button class="btn" id="allOpen">Alle offen</button><button class="btn" id="allHome">Alle Heim</button><button class="btn" id="allAway">Alle Auswärts</button><button class="btn" id="allOff">Alle streichen</button></div><p class="hint">Streichen bleibt im Text. Erledigt wird komplett entfernt.</p></div><div id="list"></div></section><section id="kopie" class="panel"><div class="card"><h2>Fertiger WhatsApp-Text</h2><textarea class="out" id="out" readonly></textarea><div class="actions"><button class="btn primary" id="copy">Text kopieren</button><button class="btn" id="share">Teilen</button></div></div></section></div><div class="bottom"><div><button class="btn primary" id="copy2">Text kopieren</button><button class="btn" id="preview">Vorschau</button></div></div><div class="toast" id="toast">Kopiert ✅</div><script>(()=>{const key='ssvg-spielanfrage-v8',olds=['ssvg-spielanfrage-v7','ssvg-spielanfrage-v6','ssvg-spielanfrage-v5'],mailTo='spielansetzungen@ssvg.de',topD='⚽ Spielanfrage ⚽ ‼️\n\n🔵⚪ SSVg Velbert U13 / Jahrgang 2014 ⚪🔵',botD='🅿️ Spielort: Heim / Auswärts nach Absprache\n\n⚽ Spielstärke: mittel\n\n📩 Bei Interesse bitte PN\n\nVG Fatih';let st={top:topD,bottom:botD,von:'2026-05-16',bis:'2026-06-28',filter:'both',strike:'wa',days:[['2026-05-16','off'],['2026-05-17','away'],['2026-06-06','off'],['2026-06-07','off'],['2026-06-13','off'],['2026-06-14','open'],['2026-06-20','open'],['2026-06-21','open'],['2026-06-27','off'],['2026-06-28','open']].map(x=>({date:x[0],status:x[1],note:'',opponent:'',time:'11:00'}))};const $=x=>document.getElementById(x);function loadStore(){try{let raw=localStorage.getItem(key);if(!raw)for(let k of olds){raw=localStorage.getItem(k);if(raw)break}if(raw)st={...st,...JSON.parse(raw)};st.days=(st.days||[]).map(x=>({...x,opponent:x.opponent||'',time:x.time||'11:00'}))}catch(e){}}function save(){localStorage.setItem(key,JSON.stringify(st))}function pad(n){return String(n).padStart(2,'0')}function D(s){let a=s.split('-').map(Number);return new Date(a[0],a[1]-1,a[2])}function iso(x){return x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate())}function add(date,days){let x=new Date(date);x.setDate(x.getDate()+days);return x}function de(s){let x=D(s);return pad(x.getDate())+'.'+pad(x.getMonth()+1)+'.'+x.getFullYear()}function wd(s){return D(s).getDay()==6?'Samstag':'Sonntag'}function ok(n){return st.filter=='both'?(n==6||n==0):st.filter=='sat'?n==6:n==0}function inRange(s,a,b){let x=D(s);return x>=D(a)&&x<=D(b)}function easter(y){let a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da)}function hday(s){let y=D(s).getFullYear(),e=easter(y),h={};h[y+'-01-01']='Neujahr';h[iso(add(e,-2))]='Karfreitag';h[iso(add(e,1))]='Ostermontag';h[y+'-05-01']='Tag der Arbeit';h[iso(add(e,39))]='Christi Himmelfahrt';h[iso(add(e,50))]='Pfingstmontag';h[iso(add(e,60))]='Fronleichnam';h[y+'-10-03']='Tag der Deutschen Einheit';h[y+'-11-01']='Allerheiligen';h[y+'-12-25']='1. Weihnachtstag';h[y+'-12-26']='2. Weihnachtstag';return h[s]||''}const ferien=[['2025-10-13','2025-10-25','Herbstferien'],['2025-12-22','2026-01-06','Weihnachtsferien'],['2026-03-30','2026-04-11','Osterferien'],['2026-05-26','2026-05-26','Pfingstferien'],['2026-07-20','2026-09-01','Sommerferien'],['2026-10-17','2026-10-31','Herbstferien'],['2026-12-23','2027-01-06','Weihnachtsferien'],['2027-03-22','2027-04-03','Osterferien'],['2027-05-18','2027-05-18','Pfingstferien'],['2027-07-19','2027-08-31','Sommerferien'],['2028-07-10','2028-08-22','Sommerferien'],['2029-07-02','2029-08-14','Sommerferien'],['2030-06-24','2030-08-06','Sommerferien']];function school(s){let r=ferien.find(x=>inRange(s,x[0],x[1]));return r?r[2]:''}function name(s){return{open:'offen',home:'Heim',away:'Auswärts',off:'gestrichen',done:'erledigt'}[s]||'offen'}function markers(s){let a=[],h=hday(s),f=school(s);if(h)a.push('Feiertag NRW: '+h);if(f)a.push('Schulferien NRW: '+f);return a.map(x=>'('+x+')').join(' ')}function one(x){let m=markers(x.date),t='🗓 '+wd(x.date)+', '+de(x.date)+(m?' '+m:'');if(x.status=='home')t+=' (Heim)';if(x.status=='away')t+=' (Auswärts)';if(x.note&&x.note.trim())t+=' '+x.note.trim();return x.status=='off'?(st.strike=='wa'?'~'+t+'~':t+' (nicht verfügbar)'):t}function out(){let v=st.days.filter(x=>x.status!='done'),a=[st.top.trim(),''];v.forEach((x,i)=>{a.push(one(x));let n=v[i+1];if(n&&Math.round((D(n.date)-D(x.date))/86400000)>1)a.push('')});a.push('',st.bottom.trim());return a.join('\n').replace(/\n{4,}/g,'\n\n\n')}function mailSubject(x){return 'Freundschaftsspiel U13 gegen '+(x.opponent||'')+' am '+de(x.date)}function mailBody(x){let gegner=(x.opponent||'[Gegner eintragen]').trim(),zeit=(x.time||'11:00').trim();return 'Hallo Florian, hallo Alessandro,\n\nkann einer von euch bitte ein Freundschaftsspiel U13 gegen '+gegner+' für den '+de(x.date)+' um '+zeit+' Uhr ansetzen? (Stadion ist frei habe ich geprüft)\n\nAm liebsten würden wir in der IMS Arena spielen, damit wir unser Equipment nicht extra woanders hinschleppen müssen.\n\n\nVielen Dank euch!\n\nViele Grüße\nFatih'}function mailFull(x){return 'An: '+mailTo+'\nBetreff: '+mailSubject(x)+'\n\n'+mailBody(x)}function sync(){st.top=$('top').value;st.bottom=$('bottom').value;st.von=$('von').value;st.bis=$('bis').value;st.strike=$('strike').value;$('out').value=out();save()}function render(){ $('top').value=st.top;$('bottom').value=st.bottom;$('von').value=st.von;$('bis').value=st.bis;$('strike').value=st.strike;document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.filter==st.filter));renderDays();$('out').value=out()}function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function renderDays(){let box=$('list');box.innerHTML='';st.days.forEach((x,i)=>{let m=markers(x.date),div=document.createElement('div');div.className='day '+x.status;div.innerHTML=`<div class="daytop"><span>🗓 ${wd(x.date)}, ${de(x.date)}${m?'<span class="mark">'+m+'</span>':''}</span><span class="badge">${name(x.status)}</span></div><div class="grid">${['open','home','away','off','done'].map(s=>`<button class="${s} ${x.status==s?'active':''}" data-s="${s}">${s=='open'?'Offen':s=='home'?'Heim':s=='away'?'Auswärts':s=='off'?'Streichen':'✅ Erledigt'}</button>`).join('')}</div><label>Info: Gegner / Mannschaft</label><input class="opp" value="${esc(x.opponent)}" placeholder="z. B. TSV Einigkeit Dornap"><div class="mini"><div><label>Uhrzeit</label><input class="time" value="${esc(x.time||'11:00')}" placeholder="11:00"></div><div><label>Zusatz</label><input class="note" value="${esc(x.note)}" placeholder="optional"></div></div><div class="mailbox"><div class="actions"><button class="btn mailcopy">Mail kopieren</button><button class="btn mailopen">Mail öffnen</button></div><p class="hint">Öffnet nur die Mail-App als Entwurf. Gesendet wird nichts automatisch.</p></div>`;div.querySelectorAll('button[data-s]').forEach(b=>b.onclick=()=>{st.days[i].status=b.dataset.s;sync();renderDays()});div.querySelector('.opp').oninput=e=>{st.days[i].opponent=e.target.value;sync()};div.querySelector('.time').oninput=e=>{st.days[i].time=e.target.value;sync()};div.querySelector('.note').oninput=e=>{st.days[i].note=e.target.value;sync()};div.querySelector('.mailcopy').onclick=()=>copyMail(i);div.querySelector('.mailopen').onclick=()=>openMail(i);box.appendChild(div)})}async function copyMail(i){sync();let x=st.days[i];if(!x.opponent.trim()){toast('Bitte Gegner eintragen');return}try{await navigator.clipboard.writeText(mailFull(x));toast('Mail kopiert ✅')}catch(e){toast('Kopieren nicht möglich')}}function openMail(i){sync();let x=st.days[i];if(!x.opponent.trim()){toast('Bitte Gegner eintragen');return}location.href='mailto:'+mailTo+'?subject='+encodeURIComponent(mailSubject(x))+'&body='+encodeURIComponent(mailBody(x))}function build(){let old=new Map(st.days.map(x=>[x.date,x])),arr=[],cur=D(st.von),end=D(st.bis);while(cur<=end){if(ok(cur.getDay())){let k=iso(cur);arr.push(old.get(k)||{date:k,status:'open',note:'',opponent:'',time:'11:00'})}cur.setDate(cur.getDate()+1)}st.days=arr}function tab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab==id));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==id));scrollTo({top:0,behavior:'smooth'})}function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',1500)}async function copy(){sync();try{await navigator.clipboard.writeText($('out').value);toast('Text kopiert ✅')}catch(e){$('out').select();document.execCommand('copy');toast('Text markiert ✅')}}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>tab(b.dataset.tab));document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{st.filter=b.dataset.filter;sync();render()});['top','bottom','von','bis','strike'].forEach(id=>$(id).oninput=sync);$('load').onclick=()=>{sync();if(D(st.von)>D(st.bis)){toast('Datum prüfen');return}build();render();toast('Tage geladen ✅')};$('toDays').onclick=()=>tab('tage');$('reset').onclick=()=>{st.top=topD;st.bottom=botD;render();save()};function all(s){st.days=st.days.map(x=>({...x,status:s}));renderDays();sync()}$('allOpen').onclick=()=>all('open');$('allHome').onclick=()=>all('home');$('allAway').onclick=()=>all('away');$('allOff').onclick=()=>all('off');$('copy').onclick=copy;$('copy2').onclick=copy;$('preview').onclick=()=>tab('kopie');$('share').onclick=async()=>{sync();if(navigator.share)try{await navigator.share({text:$('out').value});return}catch(e){}copy()};loadStore();render()})();</script></body></html>
