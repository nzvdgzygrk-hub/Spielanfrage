<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Spielanfrage"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#0b4eb3"><link rel="icon" href="icon.svg?v=4" type="image/svg+xml"><link rel="apple-touch-icon" href="icon.svg?v=4"><title>SSVg Spielanfrage</title><style>*{box-sizing:border-box}body{margin:0;background:#eef4ff;color:#102033;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:900px;margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 14px 95px}.hero{background:linear-gradient(135deg,#083b91,#0b64db,#42a5ff);color:#fff;border-radius:26px;padding:20px 16px;box-shadow:0 14px 35px #10203322}.hero h1{margin:0}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab,.btn{border:0;border-radius:15px;padding:12px;font-weight:800;background:#fff;color:#0b4eb3;box-shadow:0 6px 18px #10203314}.tab.active,.primary{background:#0b4eb3;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:#fff;border:1px solid #d8e2f2;border-radius:22px;padding:15px;margin-bottom:12px;box-shadow:0 12px 30px #10203312}label{display:block;font-weight:800;font-size:13px;margin:12px 0 6px}textarea,input,select{width:100%;border:1px solid #d8e2f2;border-radius:15px;padding:12px;font:inherit;min-height:48px}textarea{min-height:130px}.row,.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.filter{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.chip{border:1px solid #d8e2f2;border-radius:15px;background:#fff;padding:12px;font-weight:800}.chip.active{background:#e8f1ff;color:#0b4eb3;border-color:#0b4eb3}.day{background:#fff;border:1px solid #d8e2f2;border-radius:18px;padding:12px;margin-bottom:10px}.day.home{background:#f0fff7}.day.away{background:#fff8ed}.day.off{background:#fff5f5}.day.done{background:#f3f4f6;opacity:.75}.daytop{display:flex;justify-content:space-between;font-weight:900;margin-bottom:10px}.badge{font-size:12px;border-radius:999px;padding:4px 8px;background:#edf3ff}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.grid button{border:1px solid #d8e2f2;border-radius:12px;background:#f8fafc;color:#102033;padding:9px 4px;font-weight:800;font-size:12px}.grid button.active{background:#0b4eb3;color:#fff}.grid .home.active{background:#0f8f52}.grid .away.active{background:#c66a00}.grid .off.active{background:#c62828}.grid .done.active{background:#4b5563}.hint{color:#667085;font-size:13px}.out{min-height:430px}.bottom{position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);background:#eef4ffe6;backdrop-filter:blur(14px);border-top:1px solid #d8e2f2}.bottom div{max-width:900px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.toast{display:none;position:fixed;left:50%;bottom:85px;transform:translateX(-50%);background:#102033;color:white;padding:12px 16px;border-radius:999px;font-weight:800}@media(max-width:430px){.row,.actions{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.grid button:last-child{grid-column:1/-1}}</style></head><body><div class="app"><section class="hero"><h1>⚽ Spielanfrage</h1><p>SSVg Dashboard · WhatsApp-Text kopieren</p></section><nav class="tabs"><button class="tab active" data-tab="text">Text</button><button class="tab" data-tab="tage">Tage</button><button class="tab" data-tab="kopie">Kopieren</button></nav><section id="text" class="panel active"><div class="card"><h2>Standardtext</h2><label>Text oben</label><textarea id="top"></textarea><label>Text unten</label><textarea id="bottom"></textarea><button class="btn" id="reset">Standard wiederherstellen</button></div><div class="card"><h2>Zeitraum</h2><div class="row"><div><label>Von</label><input id="von" type="date"></div><div><label>Bis</label><input id="bis" type="date"></div></div><label>Tage anzeigen</label><div class="filter"><button class="chip active" data-filter="both">Beide</button><button class="chip" data-filter="sat">Samstag</button><button class="chip" data-filter="sun">Sonntag</button></div><label>Gestrichene Tage</label><select id="strike"><option value="wa">mit ~Text~</option><option value="txt">nicht verfügbar</option></select><div class="actions"><button class="btn primary" id="load">Tage laden</button><button class="btn" id="toDays">Zu Tage</button></div><p class="hint">Erledigte Tage werden nicht mitkopiert.</p></div></section><section id="tage" class="panel"><div class="card"><h2>Tage auswählen</h2><div class="actions"><button class="btn" id="allOpen">Alle offen</button><button class="btn" id="allHome">Alle Heim</button><button class="btn" id="allAway">Alle Auswärts</button><button class="btn" id="allOff">Alle streichen</button></div><p class="hint">Streichen bleibt im Text. Erledigt wird komplett entfernt.</p></div><div id="list"></div></section><section id="kopie" class="panel"><div class="card"><h2>Fertiger Text</h2><textarea class="out" id="out" readonly></textarea><div class="actions"><button class="btn primary" id="copy">Text kopieren</button><button class="btn" id="share">Teilen</button></div></div></section></div><div class="bottom"><div><button class="btn primary" id="copy2">Text kopieren</button><button class="btn" id="preview">Vorschau</button></div></div><div class="toast" id="toast">Kopiert ✅</div><script>(()=>{const key='ssvg-spielanfrage-v5',topD='⚽ Spielanfrage ⚽ ‼️\n\n🔵⚪ SSVg Velbert U13 / Jahrgang 2014 ⚪🔵',botD='🅿️ Spielort: Heim / Auswärts nach Absprache\n\n⚽ Spielstärke: mittel\n\n📩 Bei Interesse bitte PN\n\nVG Fatih';let st={top:topD,bottom:botD,von:'2026-05-16',bis:'2026-06-28',filter:'both',strike:'wa',days:[['2026-05-16','off'],['2026-05-17','away'],['2026-06-06','off'],['2026-06-07','off'],['2026-06-13','off'],['2026-06-14','open'],['2026-06-20','open'],['2026-06-21','open'],['2026-06-27','off'],['2026-06-28','open']].map(x=>({date:x[0],status:x[1],note:''}))};const $=x=>document.getElementById(x);function loadStore(){try{st={...st,...JSON.parse(localStorage.getItem(key)||'{}')}}catch(e){}}function save(){localStorage.setItem(key,JSON.stringify(st))}function pad(n){return String(n).padStart(2,'0')}function D(s){let a=s.split('-').map(Number);return new Date(a[0],a[1]-1,a[2])}function iso(x){return x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate())}function de(s){let x=D(s);return pad(x.getDate())+'.'+pad(x.getMonth()+1)+'.'+x.getFullYear()}function wd(s){return D(s).getDay()==6?'Samstag':'Sonntag'}function ok(n){return st.filter=='both'?(n==6||n==0):st.filter=='sat'?n==6:n==0}function name(s){return{open:'offen',home:'Heim',away:'Auswärts',off:'gestrichen',done:'erledigt'}[s]||'offen'}function one(x){let t='🗓 '+wd(x.date)+', '+de(x.date);if(x.status=='home')t+=' (Heim)';if(x.status=='away')t+=' (Auswärts)';if(x.note&&x.note.trim())t+=' '+x.note.trim();return x.status=='off'?(st.strike=='wa'?'~'+t+'~':t+' (nicht verfügbar)'):t}function out(){let v=st.days.filter(x=>x.status!='done'),a=[st.top.trim(),''];v.forEach((x,i)=>{a.push(one(x));let n=v[i+1];if(n&&Math.round((D(n.date)-D(x.date))/86400000)>1)a.push('')});a.push('',st.bottom.trim());return a.join('\n').replace(/\n{4,}/g,'\n\n\n')}function sync(){st.top=$('top').value;st.bottom=$('bottom').value;st.von=$('von').value;st.bis=$('bis').value;st.strike=$('strike').value;$('out').value=out();save()}function render(){ $('top').value=st.top;$('bottom').value=st.bottom;$('von').value=st.von;$('bis').value=st.bis;$('strike').value=st.strike;document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.filter==st.filter));renderDays();$('out').value=out()}function renderDays(){let box=$('list');box.innerHTML='';st.days.forEach((x,i)=>{let div=document.createElement('div');div.className='day '+x.status;div.innerHTML=`<div class="daytop"><span>🗓 ${wd(x.date)}, ${de(x.date)}</span><span class="badge">${name(x.status)}</span></div><div class="grid">${['open','home','away','off','done'].map(s=>`<button class="${s} ${x.status==s?'active':''}" data-s="${s}">${s=='open'?'Offen':s=='home'?'Heim':s=='away'?'Auswärts':s=='off'?'Streichen':'✅ Erledigt'}</button>`).join('')}</div><input value="${(x.note||'').replaceAll('"','&quot;')}" placeholder="Optional: Uhrzeit oder Zusatz">`;div.querySelectorAll('button').forEach(b=>b.onclick=()=>{st.days[i].status=b.dataset.s;sync();renderDays()});div.querySelector('input').oninput=e=>{st.days[i].note=e.target.value;sync()};box.appendChild(div)})}function build(){let old=new Map(st.days.map(x=>[x.date,x])),arr=[],cur=D(st.von),end=D(st.bis);while(cur<=end){if(ok(cur.getDay())){let k=iso(cur);arr.push(old.get(k)||{date:k,status:'open',note:''})}cur.setDate(cur.getDate()+1)}st.days=arr}function tab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab==id));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==id));scrollTo({top:0,behavior:'smooth'})}function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',1500)}async function copy(){sync();try{await navigator.clipboard.writeText($('out').value);toast('Text kopiert ✅')}catch(e){$('out').select();document.execCommand('copy');toast('Text markiert ✅')}}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>tab(b.dataset.tab));document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{st.filter=b.dataset.filter;sync();render()});['top','bottom','von','bis','strike'].forEach(id=>$(id).oninput=sync);$('load').onclick=()=>{sync();if(D(st.von)>D(st.bis)){toast('Datum prüfen');return}build();render();toast('Tage geladen ✅')};$('toDays').onclick=()=>tab('tage');$('reset').onclick=()=>{st.top=topD;st.bottom=botD;render();save()};function all(s){st.days=st.days.map(x=>({...x,status:s}));renderDays();sync()}$('allOpen').onclick=()=>all('open');$('allHome').onclick=()=>all('home');$('allAway').onclick=()=>all('away');$('allOff').onclick=()=>all('off');$('copy').onclick=copy;$('copy2').onclick=copy;$('preview').onclick=()=>tab('kopie');$('share').onclick=async()=>{sync();if(navigator.share)try{await navigator.share({text:$('out').value});return}catch(e){}copy()};loadStore();render()})();</script></body></html>
